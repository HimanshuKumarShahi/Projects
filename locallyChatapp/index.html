<!DOCTYPE html>
<html>
<head>
  <title>Local AI Chat</title>
  <style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #343541;
  color: #fff;
}

.app {
  display: flex;
  height: 100vh;
}

/* Sidebar */
.sidebar {
  width: 220px;
  background: #202123;
  padding: 20px;
}

.sidebar h2 {
  margin-bottom: 10px;
}

/* Chat Area */
.chat-container {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.chat-box {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

/* Messages */
.message {
  max-width: 70%;
  padding: 10px 15px;
  margin: 10px 0;
  border-radius: 10px;
}

.user {
  background: #0b93f6;
  align-self: flex-end;
}

.ai {
  background: #444654;
  align-self: flex-start;
}

/* Input */
.input-area {
  display: flex;
  padding: 15px;
  background: #40414f;
}

.input-area input {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 5px;
  outline: none;
}

.input-area button {
  margin-left: 10px;
  padding: 10px 15px;
  border: none;
  background: #19c37d;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}
  </style>
</head>
<body>

<div class="app">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>💬 Local AI</h2>
    <p>Gemma 270M</p>
  </div>

  <!-- Chat Area -->
  <div class="chat-container">

    <div id="chat" class="chat-box"></div>

    <div class="input-area">
      <input id="input" type="text" placeholder="Type your message..." />
      <button onclick="sendMessage()">Send</button>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
