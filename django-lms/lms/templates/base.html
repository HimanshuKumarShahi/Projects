<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LMS Platform</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<nav class="bg-blue-700 text-white p-4 shadow">
  <div class="container mx-auto flex justify-between items-center">
    <div class="font-bold text-xl">
      <a href="{% if user.is_authenticated %}/{{ user.username }}/{% else %}{% url 'home' %}{% endif %}" class="hover:underline">
        LMS WORK
      </a>
    </div>

    <div class="space-x-4">
      {% if user.is_authenticated %}
        <a href="/{{ user.username }}/" class="hover:underline">Dashboard</a>
        <a href="{% url 'logout' %}" class="hover:underline">Logout</a>
      {% else %}
        <a href="{% url 'home' %}" class="hover:underline">Home</a>
        <a href="{% url 'login' %}" class="hover:underline">Login</a>
        <a href="{% url 'register' %}" class="hover:underline">Register</a>
      {% endif %}
    </div>
  </div>
</nav>

<div class="container mx-auto mt-10">
  {% block content %}{% endblock %}
</div>

</body>
</html>
